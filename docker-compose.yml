services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: playing-app-dynamodb
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    ports:
      - "8000:8000"
    volumes:
      - dynamodb-data:/data
    user: root

  minio:
    image: minio/minio:latest
    container_name: playing-app-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: playing-app-api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      API_PORT: 4000
      JWT_SECRET: local-dev-secret-change-me
      JWT_EXPIRES_IN: 7d
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      DYNAMODB_TABLE_NAME: playing-app
      AWS_REGION: ap-northeast-1
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_BUCKET: playing-app-uploads
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      USE_REAL_TEXTRACT: "false"
    depends_on:
      dynamodb:
        condition: service_started
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: playing-app-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000/graphql
      NEXT_PUBLIC_WS_URL: ws://localhost:4000/graphql
    depends_on:
      api:
        condition: service_healthy

volumes:
  dynamodb-data:
  minio-data:
